<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Enquiry Portal</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    /* CSS Variables for standardization */
    :root {
        --primary-color: #2c3e50; /* Dark Blue/Grey */
        --accent-color: #3498db;  /* Standard Blue */
        --accent-hover: #2980b9;
        --text-color: #333;
        --error-color: #e74c3c;
        --bg-panel: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        
        /* BACKGROUND IMAGE */
        background-image: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), 
                          url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=2000');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    /*--- Navigation Bar ---*/
    .navbar {
        background: rgba(0, 0, 0, 0.8);
        padding: 15px 0;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }

    .navbar a {
        color: #ddd;
        margin: 0 20px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .navbar a:hover, .navbar a.active {
        color: var(--accent-color);
    }

    /*--- Header/Hero Section ---*/
    .header {
        text-align: center;
        color: white;
        padding: 60px 20px 20px 20px;
    }

    .header h1 {
        margin: 0;
        font-weight: 600;
        font-size: 2.5rem;
        letter-spacing: 1px;
    }
    
    .header p {
        margin-top: 10px;
        opacity: 0.8;
        font-weight: 300;
    }

    /*--- Main Form Container ---*/
    .form-box {
        width: 100%;
        max-width: 800px;
        margin: 20px auto 60px auto;
        background: var(--bg-panel);
        padding: 40px;
        border-radius: 15px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255,255,255,0.9); /* For glass effect */
    }

    /* Form Section Titles */
    .section-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 20px;
        margin-top: 30px;
        border-bottom: 2px solid #eee;
        padding-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .section-title:first-child { margin-top: 0; }

    /* Layout grid */
    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    /* Standardizing Inputs */
    .input-group {
        margin-bottom: 15px;
        position: relative;
    }

    label {
        font-weight: 500;
        font-size: 0.9rem;
        display: block;
        margin-bottom: 7px;
        color: #555;
    }

    /* Icon styles inside inputs */
    .input-icon {
        position: absolute;
        left: 12px;
        top: 38px;
        color: #aaa;
        font-size: 0.9rem;
    }

    input, textarea, select {
        width: 100%;
        padding: 12px 15px 12px 35px; /* Extra left padding for icons */
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background-color: #fff;
    }

    /* Exceptions for inputs without icons (dates) and textareas */
    input[type="date"], textarea#address, textarea#message {
        padding-left: 15px;
    }

    select {
        appearance: none; /* Modern look for select */
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-size: 1em;
    }

    /* Standardized Focus State (Glowing Frame) */
    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
    }

    textarea {
        resize: vertical;
        height: 100px;
        line-height: 1.5;
    }

    /* Button Styling */
    button {
        margin-top: 30px;
        padding: 15px;
        width: 100%;
        background: #e07b28; 
        color: white;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.3s ease, transform 0.1s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    button:hover {
        background: #b85c1a;
    }
    
    button:active {
        transform: scale(0.99);
    }

    /* Error Messages */
    .error {
        color: var(--error-color);
        font-size: 12px;
        margin-top: 5px;
        display: block;
        min-height: 18px; /* Prevents layout jump */
        font-weight: 400;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .row {
            grid-template-columns: 1fr;
            gap: 0;
        }
        .form-box {
            padding: 25px;
            width: 90%;
        }
        .header h1 {
            font-size: 2rem;
        }
    }

    :root {
  --nav-bg: #1a1a1a;
  --amber: #e07b28;
}

/* Dark Top Bar Styling */
.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: var(--nav-bg);
  padding: 0 50px;
  height: 70px;
  position: sticky;
  top: 0;
  z-index: 1001;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: white;
  text-decoration: none;
}

.logo span {
  color: var(--amber);
}

.nav-links {
  display: flex;
  gap: 30px;
}

.nav-links a {
  color: rgba(255, 255, 255, 0.9);
  text-decoration: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  transition: 0.3s;
}

.nav-links a:hover {
  color: var(--amber);
}

/* White Sub Bar Styling */
.sub-nav {
  background-color: #ffffff;
  border-bottom: 1px solid #e0e0e0;
  height: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: sticky;
  top: 70px; /* Sits right under the 70px top bar */
  z-index: 1000;
}

.sub-links {
  display: flex;
  gap: 40px;
}

.sub-links a {
  text-decoration: none;
  color: #333;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
</style>

</head>

<body>

<!-- TOP BAR (DARK) - Matches image_197f6a.png and WhatsApp Image 2026-05-03 at 4.32.41 PM.jpeg -->
<nav class="top-nav">
  <a href="index.html" class="logo">Flora <span>Haven</span></a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="uidProject.html">Shopping</a>
    <a href="contact.html" style="color: var(--amber);">Contact Us</a> 
    <a href="home.html#about">About Us</a>
    <a href="home.html#motto">Our Motto</a>
  </div>
</nav>



<div class="header">
    <h1>Submit Enquiry</h1>
    <p>Please fill out the form below. We usually respond within 24 business hours.</p>
</div>

<div class="form-box">

    <form onsubmit="return validateForm()">

        <!-- Section 1: Customer Details -->
        <div class="section-title"><i class="fas fa-user-circle"></i> Customer Information</div>
        
        <div class="input-group">
            <label>Full Name</label>
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="name" placeholder="Name">
            <span class="error" id="nameError"></span>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Email Address</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" placeholder="example@email.com">
                <span class="error" id="emailError"></span>
            </div>
            
            <div class="input-group">
                <label>Phone Number</label>
                <i class="fas fa-phone input-icon"></i>
                <input type="text" id="phone" placeholder="10-digit number">
                <span class="error" id="phoneError"></span>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Gender</label>
                <i class="fas fa-venus-mars input-icon"></i>
                <select id="gender">
                    <option value="" disabled selected>Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
                <span class="error" id="genderError"></span>
            </div>
            
            <div class="input-group">
                <label>Pincode / Zip Code</label>
                <i class="fas fa-map-pin input-icon"></i>
                <input type="text" id="pincode" placeholder="6-digit code">
                <span class="error" id="pincodeError"></span>
            </div>
        </div>

        <div class="input-group">
            <label>Shipping Address</label>
            <!-- No icon for textarea for better spacing -->
            <textarea id="address" placeholder="Enter your complete address..."></textarea>
            <span class="error" id="addressError"></span>
        </div>

        <!-- Section 2: Issue Details -->
        <div class="section-title"><i class="fas fa-exclamation-circle"></i> Issue & Product Details</div>

        <div class="row">
            <div class="input-group">
                <label>Nature of Issue</label>
                <i class="fas fa-tag input-icon"></i>
                <select id="issue">
                    <option value="" disabled selected>Select Issue Type</option>
                    <option>Damaged Product</option>
                    <option>Misplaced Order</option>
                    <option>Order Not Arrived</option>
                    <option>Other</option>
                </select>
                <span class="error" id="issueError"></span>
            </div>

            <div class="input-group">
                <label>Product Category</label>
                <i class="fas fa-box-open input-icon"></i>
                <select id="category" onchange="loadProducts()">
                    <option value="" disabled selected>Select Category</option>
                    <option value="plant">Plant</option>
                    <option value="vase">Vase</option>
                    <option value="perfume">Perfume</option>
                </select>
                <span class="error" id="categoryError"></span>
            </div>
        </div>

        <div class="input-group">
            <label>Specific Product</label>
            <i class="fas fa-shopping-bag input-icon"></i>
            <select id="product">
                <option value="" disabled selected>Please select category first</option>
            </select>
            <span class="error" id="productError"></span>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Order Date</label>
                <input type="date" id="orderDate">
                <span class="error" id="orderError"></span>
            </div>

            <div class="input-group">
                <label>Expected Delivery Date</label>
                <input type="date" id="expectDate">
                <span class="error" id="expectError"></span>
            </div>
        </div>

        <div class="input-group">
            <label>Detailed Description of Issue</label>
            <textarea id="message" placeholder="Please provide details such as Order ID and specific problem..."></textarea>
            <span class="error" id="msgError"></span>
        </div>

        <button type="submit" >Submit Enquiry Request</button>

    </form>

</div>

<script>

// LOAD PRODUCTS dynamically based on category
function loadProducts(){

    let category = document.getElementById("category").value;
    let productSelect = document.getElementById("product");
    let issue = document.getElementById("issue").value;

    // Reset product dropdown
    productSelect.innerHTML = "<option value='' disabled selected>Select Product</option>";

    // If issue is "Other", product selection might not be necessary
    if(issue === "Other"){
        let opt = document.createElement("option");
        opt.value = "N/A";
        opt.text = "Not applicable for general enquiry";
        productSelect.add(opt);
        productSelect.value = "N/A"; // Auto-select
        return;
    }

    let list = [];

    if(category === "plant"){
        list=["Aloe Vera","Snake Plant","Peace Lily","Spider Plant","Money Plant","Bamboo","Jade Plant","Lavender","Rose","Mint"];
    }
    else if(category === "vase"){
        list=["Ceramic Vase","Glass Vase","Clay Vase","Metal Vase","Stone Vase","Wooden Vase","Painted Vase"];
    }
    else if(category === "perfume"){
        list=["Rose Perfume","Lavender Mist","Ocean Breeze","Vanilla Dream","Luxury Oud","Jasmine Bliss"];
    }

    if(list.length > 0) {
        for(let i=0; i<list.length; i++){
            let opt = document.createElement("option");
            opt.value = list[i];
            opt.text = list[i];
            productSelect.add(opt);
        }
    } else if (category !== "") {
         productSelect.innerHTML = "<option value='' disabled selected>No products found</option>";
    }
}

// VALIDATION Logic
function validateForm(){

    let valid = true;

    // Helper to set error messages
    function setError(id, message) {
        document.getElementById(id).innerText = message;
        if(message !== "") valid = false;
    }

    // --- Personal Info ---
    
    // Name: Letters and spaces only
    let name = document.getElementById("name").value.trim();
    let namePattern = /^[A-Za-z\s]+$/;
    if(name === ""){
        setError("nameError", "Name is required");
    } else if(!namePattern.test(name)){
        setError("nameError", "Only letters and spaces allowed");
    } else {
        setError("nameError", "");
    }

    // Gender
    let gender = document.getElementById("gender").value;
    if(gender === ""){
        setError("genderError", "Please select gender");
    } else {
        setError("genderError", "");
    }

    // Email: Standard email regex
    let email = document.getElementById("email").value.trim();
    let emailPattern = /^[a-zA-Z0-9._-]+@[a-zA-Z0-9.-]+\.[a-z]{2,6}$/;
    if(email === "") {
        setError("emailError", "Email is required");
    } else if(!emailPattern.test(email)){
        setError("emailError", "Enter a valid email address (e.g., name@domain.com)");
    } else {
        setError("emailError", "");
    }

    // Phone: Exactly 10 digits
    let phone = document.getElementById("phone").value.trim();
    if(phone === "") {
        setError("phoneError", "Phone number is required");
    } else if(phone.length !== 10 || isNaN(phone)){
        setError("phoneError", "Enter exactly 10 digits");
    } else {
        setError("phoneError", "");
    }

    // Address
    let addr = document.getElementById("address").value.trim();
    if(addr === ""){
        setError("addressError", "Shipping address is required");
    } else if(addr.length < 10) {
        setError("addressError", "Please provide more address details");
    } else {
        setError("addressError", "");
    }

    // Pincode: Exactly 6 digits
    let pin = document.getElementById("pincode").value.trim();
    if(pin === "") {
        setError("pincodeError", "Required");
    } else if(pin.length !== 6 || isNaN(pin)){
        setError("pincodeError", "Must be 6 digits");
    } else {
        setError("pincodeError", "");
    }

    // --- Issue Info ---

    // Issue Type
    let issue = document.getElementById("issue").value;
    if(issue === ""){
        setError("issueError", "Select issue type");
    } else {
        setError("issueError", "");
    }

    // Category
    let cat = document.getElementById("category").value;
    if(cat === ""){
        setError("categoryError", "Select category");
    } else {
        setError("categoryError", "");
    }

    // Product
    let prod = document.getElementById("product").value;
    if(prod === ""){
        setError("productError", "Select product");
    } else {
        setError("productError", "");
    }

    // Dates
    let od = document.getElementById("orderDate").value;
    let ed = document.getElementById("expectDate").value;

    if(od === ""){
        setError("orderError", "Required");
    } else {
        setError("orderError", "");
    }

    if(ed === ""){
        setError("expectError", "Required");
    } else {
        setError("expectError", "");
    }

    // Message/Description
    let msg = document.getElementById("message").value.trim();
    if(msg === ""){
        setError("msgError", "Please describe your issue");
    } else if(msg.length < 15) {
        setError("msgError", "Please provide a bit more detail");
    } else {
        setError("msgError", "");
    }

    // --- FINAL SUBMISSION ---

  if(valid){
    alert("Submitted successfully!");

    window.location.href = "contact.html";
}
    
    return false; // Prevents actual page reload for this demo
}

</script>

</body>
</html>
